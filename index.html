<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Number Pop</title>
<style>
  :root {
    --bg-1: #0b0f1a;
    --bg-2: #131a2e;
    --accent: #e8eefc;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(circle at 30% 20%, var(--bg-2), var(--bg-1) 70%);
    font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    overflow: hidden;
    cursor: crosshair;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  #stage {
    position: fixed;
    inset: 0;
  }
  .hint {
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    color: var(--accent);
    opacity: 0.35;
    font-size: clamp(16px, 3.5vw, 28px);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: center;
    pointer-events: none;
    transition: opacity 0.6s ease;
    font-weight: 500;
  }
  .hint.gone { opacity: 0; }

  .pop {
    position: fixed;
    transform: translate(-50%, -50%);
    font-weight: 700;
    line-height: 1;
    pointer-events: none;
    will-change: transform, opacity;
    animation: pop-life 5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes pop-life {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    6%   { opacity: 1; transform: translate(-50%, -50%) scale(1.12); }
    14%  { transform: translate(-50%, -54%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -150%) scale(0.9); }
  }

  .ring {
    position: fixed;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    border: 2px solid currentColor;
    animation: ring-life 0.9s ease-out forwards;
  }
  @keyframes ring-life {
    0%   { width: 8px; height: 8px; opacity: 0.7; }
    100% { width: 130px; height: 130px; opacity: 0; }
  }
</style>
</head>
<body>
<div id="stage"></div>
<div class="hint" id="hint">Click anywhere</div>

<script>
  const stage = document.getElementById("stage");
  const hint = document.getElementById("hint");
  let dismissed = false;

  // Pleasant, varied hues; saturated but legible on dark bg.
  const HUES = [188, 152, 48, 12, 280, 330, 214, 96];

  function spawn(x, y) {
    if (!dismissed) {
      dismissed = true;
      hint.classList.add("gone");
      setTimeout(() => hint.remove(), 700);
    }

    const n = Math.floor(Math.random() * 100) + 1;
    const hue = HUES[Math.floor(Math.random() * HUES.length)];
    const color = `hsl(${hue} 90% 68%)`;

    const el = document.createElement("div");
    el.className = "pop";
    el.textContent = n;
    el.style.left = x + "px";
    el.style.top = y + "px";
    el.style.color = color;
    el.style.fontSize = "clamp(48px, 9vw, 120px)";
    el.style.textShadow = `0 0 22px hsl(${hue} 90% 60% / 0.55), 0 4px 18px rgba(0,0,0,0.4)`;
    el.style.transform = `translate(-50%, -50%) rotate(${(Math.random() * 16 - 8).toFixed(1)}deg)`;
    stage.appendChild(el);
    el.addEventListener("animationend", () => el.remove());

    const ring = document.createElement("div");
    ring.className = "ring";
    ring.style.left = x + "px";
    ring.style.top = y + "px";
    ring.style.color = color;
    stage.appendChild(ring);
    ring.addEventListener("animationend", () => ring.remove());
  }

  function handle(e) {
    const t = e.touches && e.touches[0];
    const x = t ? t.clientX : e.clientX;
    const y = t ? t.clientY : e.clientY;
    spawn(x, y);
  }

  window.addEventListener("pointerdown", handle);
</script>
</body>
</html>
