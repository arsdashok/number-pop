<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Number Pop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Andika:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-1: #0b0f1a;
    --bg-2: #131a2e;
    --accent: #e8eefc;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(circle at 30% 20%, var(--bg-2), var(--bg-1) 70%);
    font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    overflow: hidden;
    cursor: crosshair;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  #stage {
    position: fixed;
    inset: 0;
  }
  .hint {
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    color: var(--accent);
    opacity: 0.35;
    font-size: clamp(16px, 3.5vw, 28px);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: center;
    pointer-events: none;
    transition: opacity 0.6s ease;
    font-weight: 500;
  }
  .hint.gone { opacity: 0; }

  .pop {
    position: fixed;
    transform: translate(-50%, -50%);
    font-weight: 700;
    line-height: 1;
    pointer-events: none;
    will-change: transform, opacity;
    animation: pop-life 5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes pop-life {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    6%   { opacity: 1; transform: translate(-50%, -50%) scale(1.12); }
    14%  { transform: translate(-50%, -54%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -150%) scale(0.9); }
  }

  .ring {
    position: fixed;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    border: 2px solid currentColor;
    animation: ring-life 0.9s ease-out forwards;
  }
  @keyframes ring-life {
    0%   { width: 8px; height: 8px; opacity: 0.7; }
    100% { width: 130px; height: 130px; opacity: 0; }
  }

  /* ---------- settings (teacher) ---------- */
  #gear {
    position: fixed; top: 12px; left: 12px; z-index: 20;
    width: 46px; height: 46px; border-radius: 50%;
    border: 1px solid rgba(232, 238, 252, 0.25);
    background: rgba(19, 26, 46, 0.82); color: var(--accent);
    font-size: 22px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  #gear:hover { background: rgba(19, 26, 46, 0.98); }

  #settings {
    position: fixed; top: 68px; left: 12px; z-index: 20;
    width: min(430px, 92vw); max-height: 82vh; overflow: auto;
    background: rgba(11, 15, 26, 0.97);
    border: 1px solid rgba(232, 238, 252, 0.18); border-radius: 14px;
    padding: 18px; color: var(--accent);
    cursor: auto; user-select: auto; -webkit-user-select: auto;
    box-shadow: 0 14px 46px rgba(0, 0, 0, 0.6);
  }
  #settings[hidden] { display: none; }
  #settings h2 {
    font-size: 14px; letter-spacing: 0.14em; text-transform: uppercase;
    opacity: 0.85; margin-bottom: 14px; font-weight: 600;
  }
  .srow { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 14px; }
  #settings input {
    width: 66px; background: #0b0f1a; border: 1px solid rgba(232, 238, 252, 0.28);
    color: var(--accent); border-radius: 6px; padding: 7px; font: inherit; text-align: center;
  }
  .sbtn {
    font: inherit; font-size: 13px; border: 1px solid rgba(232, 238, 252, 0.22);
    background: rgba(232, 238, 252, 0.08); color: var(--accent);
    border-radius: 6px; padding: 7px 13px; cursor: pointer;
  }
  .sbtn:hover { background: rgba(232, 238, 252, 0.16); }
  .sbtn.go { background: hsl(152 60% 46%); border-color: transparent; color: #06120a; font-weight: 700; }

  /* mode toggle (Numbers / Letters) */
  #mode-row { gap: 8px; margin-bottom: 16px; }
  .mode-btn {
    font: inherit; font-size: 14px; font-weight: 600; cursor: pointer;
    border: 1px solid rgba(232, 238, 252, 0.28); border-radius: 8px;
    background: rgba(232, 238, 252, 0.05); color: var(--accent); padding: 9px 16px;
  }
  .mode-btn.active { background: hsl(188 90% 60%); color: #04141a; border-color: transparent; }

  #count { margin-left: auto; opacity: 0.85; font-size: 13px; white-space: nowrap; }
  .picker { display: grid; gap: 4px; margin-top: 4px; }
  #grid        { grid-template-columns: repeat(10, 1fr); }
  #letter-grid { grid-template-columns: repeat(13, 1fr); }
  .cell {
    font: inherit; font-size: 12px; padding: 7px 0; text-align: center;
    border: 1px solid rgba(232, 238, 252, 0.15); background: rgba(232, 238, 252, 0.04);
    color: rgba(232, 238, 252, 0.7); border-radius: 5px; cursor: pointer;
  }
  .cell:hover { background: rgba(232, 238, 252, 0.12); }
  .cell.on { background: hsl(188 90% 60%); color: #04141a; border-color: transparent; font-weight: 700; }
  /* letters use a school-standard infant font (single-storey a/g), like Tobi's materials */
  #letter-grid .cell { font-family: 'Andika', 'Comic Sans MS', sans-serif; font-size: 13px; }
</style>
</head>
<body>
<div id="stage"></div>
<div class="hint" id="hint">Click anywhere</div>

<button id="gear" title="What pops?" aria-label="Settings">⚙</button>
<div id="settings" hidden>
  <h2>What pops?</h2>

  <div class="srow" id="mode-row">
    <button class="mode-btn active" id="mode-numbers" type="button">🔢 Numbers</button>
    <button class="mode-btn" id="mode-letters" type="button">🔤 Letters</button>
  </div>

  <!-- Numbers -->
  <div id="numbers-controls">
    <div class="srow">
      <label>From <input id="from" type="number" min="1" max="100" value="10"></label>
      <label>To <input id="to" type="number" min="1" max="100" value="15"></label>
      <button class="sbtn go" id="setRange" type="button">Set range</button>
    </div>
    <div class="srow">
      <button class="sbtn" id="clear" type="button">Clear</button>
      <button class="sbtn" id="all" type="button">All 1–100</button>
      <span id="count"></span>
    </div>
    <div id="grid" class="picker"></div>
  </div>

  <!-- Letters -->
  <div id="letters-controls" hidden>
    <div class="srow">
      <button class="sbtn go" id="allLet" type="button">All A–Z</button>
      <button class="sbtn" id="vowelsLet" type="button">Vowels</button>
      <button class="sbtn" id="clearLet" type="button">Clear</button>
      <button class="sbtn" id="caseToggle" type="button" style="width:60px;">ABC</button>
      <span id="countLet"></span>
    </div>
    <div id="letter-grid" class="picker"></div>
  </div>

  <p id="tip" style="font-size:12px; opacity:.6; margin-top:12px; line-height:1.5;">
    Use From/To for a range, or tap single numbers for any custom set (they can skip, e.g. 10, 12, 15). Your choice is saved.
  </p>
</div>

<script>
  const stage = document.getElementById("stage");
  const hint = document.getElementById("hint");
  let dismissed = false;

  // Pleasant, varied hues; saturated but legible on dark bg.
  const HUES = [188, 152, 48, 12, 280, 330, 214, 96];

  const MAX = 100;
  const ALPH = Array.from({ length: 26 }, (_, i) => String.fromCharCode(65 + i)); // A..Z
  const VOWELS = ["A", "E", "I", "O", "U"];

  /* ---------- persisted state ---------- */
  const KEY_NUM  = "numberpop.selection"; // kept for backward compatibility
  const KEY_LET  = "numberpop.letters";
  const KEY_MODE = "numberpop.mode";
  const KEY_CASE = "numberpop.case";

  function loadNumbers() {
    try {
      const arr = JSON.parse(localStorage.getItem(KEY_NUM));
      if (Array.isArray(arr) && arr.length) return new Set(arr);
    } catch (e) {}
    const s = new Set(); for (let i = 1; i <= MAX; i++) s.add(i); return s; // default all 1..100
  }
  function loadLetters() {
    try {
      const arr = JSON.parse(localStorage.getItem(KEY_LET));
      if (Array.isArray(arr) && arr.length) return new Set(arr.filter(x => ALPH.includes(x)));
    } catch (e) {}
    return new Set(ALPH); // default all A..Z
  }
  const saveNumbers = () => { try { localStorage.setItem(KEY_NUM, JSON.stringify([...selectedNumbers].sort((a, b) => a - b))); } catch (e) {} };
  const saveLetters = () => { try { localStorage.setItem(KEY_LET, JSON.stringify(ALPH.filter(c => selectedLetters.has(c)))); } catch (e) {} };
  const saveMode = () => { try { localStorage.setItem(KEY_MODE, mode); } catch (e) {} };
  const saveCase = () => { try { localStorage.setItem(KEY_CASE, letterCase); } catch (e) {} };

  let selectedNumbers = loadNumbers();
  let selectedLetters = loadLetters();
  let mode = localStorage.getItem(KEY_MODE) === "letters" ? "letters" : "numbers";
  let letterCase = localStorage.getItem(KEY_CASE) === "lower" ? "lower" : "upper";

  const isLetters = () => mode === "letters";
  const dispLetter = (ch) => letterCase === "lower" ? ch.toLowerCase() : ch;

  /* ---------- settings UI ---------- */
  const gear = document.getElementById("gear");
  const settings = document.getElementById("settings");
  const grid = document.getElementById("grid");
  const letterGrid = document.getElementById("letter-grid");
  const fromIn = document.getElementById("from");
  const toIn = document.getElementById("to");
  const countEl = document.getElementById("count");
  const countLetEl = document.getElementById("countLet");
  const tip = document.getElementById("tip");
  const numbersControls = document.getElementById("numbers-controls");
  const lettersControls = document.getElementById("letters-controls");
  const modeNumBtn = document.getElementById("mode-numbers");
  const modeLetBtn = document.getElementById("mode-letters");

  // number grid
  for (let n = 1; n <= MAX; n++) {
    const c = document.createElement("button");
    c.className = "cell"; c.type = "button"; c.textContent = n; c.dataset.n = n;
    c.addEventListener("click", () => {
      if (selectedNumbers.has(n)) selectedNumbers.delete(n); else selectedNumbers.add(n);
      c.classList.toggle("on"); saveNumbers(); updateCount();
    });
    grid.appendChild(c);
  }
  const numCells = Array.from(grid.children);

  // letter grid
  ALPH.forEach(ch => {
    const c = document.createElement("button");
    c.className = "cell"; c.type = "button"; c.textContent = ch; c.dataset.ch = ch;
    c.addEventListener("click", () => {
      if (selectedLetters.has(ch)) selectedLetters.delete(ch); else selectedLetters.add(ch);
      c.classList.toggle("on"); saveLetters(); updateCount();
    });
    letterGrid.appendChild(c);
  });
  const letterCells = Array.from(letterGrid.children);

  function paintNumGrid() {
    numCells.forEach(c => c.classList.toggle("on", selectedNumbers.has(+c.dataset.n)));
    updateCount();
  }
  function paintLetterGrid() {
    letterCells.forEach(c => {
      c.textContent = dispLetter(c.dataset.ch);
      c.classList.toggle("on", selectedLetters.has(c.dataset.ch));
    });
    updateCount();
  }
  function updateCount() {
    const nn = selectedNumbers.size, nl = selectedLetters.size;
    countEl.textContent = nn + (nn === 1 ? " number" : " numbers");
    countLetEl.textContent = nl + (nl === 1 ? " letter" : " letters");
  }

  /* ---------- number controls ---------- */
  function clampRange() {
    let a = parseInt(fromIn.value, 10), b = parseInt(toIn.value, 10);
    if (isNaN(a)) a = 1; if (isNaN(b)) b = MAX;
    a = Math.min(Math.max(a, 1), MAX); b = Math.min(Math.max(b, 1), MAX);
    if (a > b) { const t = a; a = b; b = t; }
    fromIn.value = a; toIn.value = b; return [a, b];
  }
  document.getElementById("setRange").addEventListener("click", () => {
    const [a, b] = clampRange();
    selectedNumbers = new Set(); for (let n = a; n <= b; n++) selectedNumbers.add(n);
    paintNumGrid(); saveNumbers();
  });
  document.getElementById("clear").addEventListener("click", () => { selectedNumbers = new Set(); paintNumGrid(); saveNumbers(); });
  document.getElementById("all").addEventListener("click", () => {
    selectedNumbers = new Set(); for (let n = 1; n <= MAX; n++) selectedNumbers.add(n);
    paintNumGrid(); saveNumbers();
  });

  /* ---------- letter controls ---------- */
  document.getElementById("allLet").addEventListener("click", () => { selectedLetters = new Set(ALPH); paintLetterGrid(); saveLetters(); });
  document.getElementById("vowelsLet").addEventListener("click", () => { selectedLetters = new Set(VOWELS); paintLetterGrid(); saveLetters(); });
  document.getElementById("clearLet").addEventListener("click", () => { selectedLetters = new Set(); paintLetterGrid(); saveLetters(); });
  document.getElementById("caseToggle").addEventListener("click", (e) => {
    letterCase = letterCase === "upper" ? "lower" : "upper";
    e.target.textContent = letterCase === "upper" ? "ABC" : "abc";
    paintLetterGrid(); saveCase();
  });

  /* ---------- mode switch ---------- */
  function applyMode() {
    const letters = isLetters();
    numbersControls.hidden = letters;
    lettersControls.hidden = !letters;
    modeNumBtn.classList.toggle("active", !letters);
    modeLetBtn.classList.toggle("active", letters);
    tip.innerHTML = letters
      ? "Tap the letters you want, or use All A–Z / Vowels. ABC/abc switches case. Then tap anywhere on screen to pop letters. Saved."
      : "Use From/To for a range, or tap single numbers for any custom set (they can skip, e.g. 10, 12, 15). Your choice is saved.";
    letters ? paintLetterGrid() : paintNumGrid();
  }
  modeNumBtn.addEventListener("click", () => { mode = "numbers"; saveMode(); applyMode(); });
  modeLetBtn.addEventListener("click", () => { mode = "letters"; saveMode(); applyMode(); });

  gear.addEventListener("click", () => { settings.hidden = !settings.hidden; });

  document.getElementById("caseToggle").textContent = letterCase === "upper" ? "ABC" : "abc";
  paintNumGrid(); paintLetterGrid(); applyMode();

  /* ---------- the pop ---------- */
  function spawn(x, y) {
    const pool = isLetters() ? ALPH.filter(c => selectedLetters.has(c)) : [...selectedNumbers];
    if (!pool.length) return; // nothing selected -> nothing to pop

    if (!dismissed) {
      dismissed = true;
      hint.classList.add("gone");
      setTimeout(() => hint.remove(), 700);
    }

    const item = pool[Math.floor(Math.random() * pool.length)];
    const shown = isLetters() ? dispLetter(item) : item;
    const hue = HUES[Math.floor(Math.random() * HUES.length)];
    const color = `hsl(${hue} 90% 68%)`;

    const el = document.createElement("div");
    el.className = "pop";
    el.textContent = shown;
    if (isLetters()) el.style.fontFamily = "'Andika', 'Comic Sans MS', sans-serif";
    el.style.left = x + "px";
    el.style.top = y + "px";
    el.style.color = color;
    el.style.fontSize = "clamp(48px, 9vw, 120px)";
    el.style.textShadow = `0 0 22px hsl(${hue} 90% 60% / 0.55), 0 4px 18px rgba(0,0,0,0.4)`;
    el.style.transform = `translate(-50%, -50%) rotate(${(Math.random() * 16 - 8).toFixed(1)}deg)`;
    stage.appendChild(el);
    el.addEventListener("animationend", () => el.remove());

    const ring = document.createElement("div");
    ring.className = "ring";
    ring.style.left = x + "px";
    ring.style.top = y + "px";
    ring.style.color = color;
    stage.appendChild(ring);
    ring.addEventListener("animationend", () => ring.remove());
  }

  function handle(e) {
    // don't pop when tapping the settings panel or the gear button
    if (e.target.closest("#settings") || e.target.closest("#gear")) return;
    const t = e.touches && e.touches[0];
    const x = t ? t.clientX : e.clientX;
    const y = t ? t.clientY : e.clientY;
    spawn(x, y);
  }

  window.addEventListener("pointerdown", handle);
</script>
</body>
</html>
